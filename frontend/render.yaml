# SmarTAI Reflex state server — Render free-tier blueprint
#
# IMPORTANT: Reflex apps have a Python State server (websocket-based) that
# can't be replaced by a purely static frontend. On Render Free, running the
# full Reflex frontend+backend in one Web Service can OOM during startup
# compilation, so the free deployment should be split:
#   1. Render Static Site serves the exported frontend HTML/JS.
#   2. This Web Service runs only the Reflex Python state backend.
#   3. The separate FastAPI service runs SmarTAI business APIs.
#
# Pair this with frontend/render-static.yaml and backend/render.yaml.

services:
  - type: web
    name: smartai-reflex-state
    env: python
    plan: free
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: |
      reflex run --env prod --backend-only --backend-host 0.0.0.0 --backend-port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # URL of the FastAPI backend (deployed via backend/render.yaml).
      # TODO: 部署完后端拿到真实 URL 后回填这里。默认值假设后端服务名叫
      # smartai-backend（与 backend/render.yaml `name:` 字段一致）。
      - key: SMARTAI_BACKEND_URL
        value: "https://smartai-backend.onrender.com"
      # The public URL the exported static frontend uses to reach this Reflex
      # state server. If Render gives this service a different URL, update both
      # this value and the Static Site's build-time REFLEX_API_URL.
      - key: REFLEX_API_URL
        value: "https://smartai-reflex-state.onrender.com"
