# SmarTAI exported Reflex frontend — Render Static Site blueprint
#
# This serves only the static HTML/JS generated by Reflex. It must be paired
# with a running Reflex state backend (frontend/render.yaml) and the FastAPI
# business backend (backend/render.yaml).

services:
  - type: static
    name: smartai-frontend
    rootDir: frontend
    buildCommand: |
      pip install -r requirements.txt &&
      reflex export --frontend-only --no-zip
    staticPublishPath: .web/build/client
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Build-time URL baked into the exported frontend so browser WebSocket
      # events reach the Reflex state server.
      - key: REFLEX_API_URL
        value: "https://smartai-reflex-state.onrender.com"
      # Kept in sync for code paths that read the backend URL while compiling.
      # Runtime FastAPI calls are made by the Reflex state server.
      - key: SMARTAI_BACKEND_URL
        value: "https://smartai-backend.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
